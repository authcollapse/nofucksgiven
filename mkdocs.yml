site_name: nofucksgiven
site_description: Evidence-first symmetric encryption research workspace.
repo_name: authcollapse/nofucksgiven
repo_url: https://github.com/authcollapse/nofucksgiven
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to night mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Start Here: index.md
  - Evidence Leaderboard: leaderboard.md
  - Local Benchmarks: local-benchmarks.md
  - Development Map: development-map.md
  - Research Roadmap: roadmap.md
  - Threat Model: threat-model.md
  - Safety Notes: safety-notes.md
  - Reading List: reading-list.md
  - Experiment Log: experiment-log.md
  - Commands: commands.md
  - Contributing: contributing.md
  - Security: security.md
  - License: license.md
