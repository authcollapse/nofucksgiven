site_name: nofucksgiven
site_description: Evidence-first symmetric encryption research workspace.
repo_name: authcollapse/nofucksgiven
repo_url: https://github.com/authcollapse/nofucksgiven
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow
  palette:
    - scheme: default
      primary: black
      accent: blue

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Start Here: index.md
  - Evidence Leaderboard: leaderboard.md
  - Development Map: development-map.md
  - Research Roadmap: roadmap.md
  - Threat Model: threat-model.md
  - Safety Notes: safety-notes.md
  - Reading List: reading-list.md
  - Experiment Log: experiment-log.md
  - Commands: commands.md
  - Contributing: contributing.md
  - Security: security.md
  - License: license.md
